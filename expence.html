<!DOCTYPE html>
<html>
<head>
    <title>Ultimate Expense Tracker</title>
</head>
<body>

<h2>Ultimate Expense Tracker</h2>

<h3 id="balance">Balance: ₹0</h3>
<p>Income: ₹<span id="income">0</span></p>
<p>Expense: ₹<span id="expense">0</span></p>

<hr>

<h3>Add Transaction</h3>
<input type="text" id="text" placeholder="Description"><br>
<input type="number" id="amount" placeholder="Amount (+ income, - expense)"><br>
<input type="date" id="date"><br>

<select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Bills</option>
    <option>Shopping</option>
    <option>Salary</option>
    <option>Others</option>
</select><br>

<button onclick="addTransaction()">Add / Update</button>

<hr>

<h3>Set Category Budget</h3>
<select id="budgetCategory">
    <option>Food</option>
    <option>Travel</option>
    <option>Bills</option>
    <option>Shopping</option>
    <option>Salary</option>
    <option>Others</option>
</select>
<input type="number" id="budgetAmount" placeholder="Budget Amount">
<button onclick="setBudget()">Set Budget</button>

<hr>

<h3>Filters</h3>
<select id="filterType" onchange="updateUI()">
    <option value="all">All</option>
    <option value="income">Income</option>
    <option value="expense">Expense</option>
</select>

<input type="month" id="monthFilter" onchange="updateUI()">
<input type="text" id="search" placeholder="Search..." onkeyup="updateUI()">

<button onclick="exportCSV()">Export CSV</button>
<button onclick="toggleDark()">Toggle Dark Mode</button>

<hr>

<h3>Transactions</h3>
<ul id="list"></ul>

<hr>

<h3>Category Spending Chart</h3>
<canvas id="chart" width="400" height="400"></canvas>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let budgets = JSON.parse(localStorage.getItem("budgets")) || {};
let editIndex = -1;
let darkMode = false;

function addTransaction() {
    let text = document.getElementById("text").value;
    let amount = +document.getElementById("amount").value;
    let date = document.getElementById("date").value;
    let category = document.getElementById("category").value;

    if (!text || !amount || !date) {
        alert("Fill all fields");
        return;
    }

    let obj = { text, amount, date, category };

    if (editIndex === -1) {
        transactions.push(obj);
    } else {
        transactions[editIndex] = obj;
        editIndex = -1;
    }

    save();
    clearFields();
    updateUI();
}

function setBudget() {
    let category = document.getElementById("budgetCategory").value;
    let amount = +document.getElementById("budgetAmount").value;
    budgets[category] = amount;
    save();
    alert("Budget set for " + category);
}

function deleteTransaction(index) {
    transactions.splice(index, 1);
    save();
    updateUI();
}

function editTransaction(index) {
    let t = transactions[index];
    document.getElementById("text").value = t.text;
    document.getElementById("amount").value = t.amount;
    document.getElementById("date").value = t.date;
    document.getElementById("category").value = t.category;
    editIndex = index;
}

function updateUI() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0, income = 0, expense = 0;
    let filter = document.getElementById("filterType").value;
    let month = document.getElementById("monthFilter").value;
    let search = document.getElementById("search").value.toLowerCase();

    let categorySpending = {};

    transactions.forEach((t, index) => {

        if (filter === "income" && t.amount < 0) return;
        if (filter === "expense" && t.amount > 0) return;
        if (month && !t.date.startsWith(month)) return;
        if (!t.text.toLowerCase().includes(search)) return;

        let li = document.createElement("li");
        li.innerHTML = `
            ${t.text} | ₹${t.amount} | ${t.category} | ${t.date}
            <button onclick="editTransaction(${index})">Edit</button>
            <button onclick="deleteTransaction(${index})">Delete</button>
        `;
        list.appendChild(li);

        total += t.amount;
        if (t.amount > 0) income += t.amount;
        else {
            expense += t.amount;
            categorySpending[t.category] = 
                (categorySpending[t.category] || 0) + Math.abs(t.amount);
        }
    });

    document.getElementById("balance").innerText = "Balance: ₹" + total;
    document.getElementById("income").innerText = income;
    document.getElementById("expense").innerText = Math.abs(expense);

    checkBudgets(categorySpending);
    drawChart(categorySpending);
}

function checkBudgets(categorySpending) {
    for (let cat in budgets) {
        if (categorySpending[cat] > budgets[cat]) {
            alert("⚠ Budget exceeded for " + cat);
        }
    }
}

function drawChart(data) {
    let canvas = document.getElementById("chart");
    let ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let total = Object.values(data).reduce((a,b)=>a+b,0);
    let startAngle = 0;
    let colors = ["red","blue","green","orange","purple","brown"];

    let i = 0;
    for (let key in data) {
        let sliceAngle = 2 * Math.PI * data[key] / total;
        ctx.fillStyle = colors[i++];
        ctx.beginPath();
        ctx.moveTo(200,200);
        ctx.arc(200,200,150,startAngle,startAngle+sliceAngle);
        ctx.closePath();
        ctx.fill();
        startAngle += sliceAngle;
    }
}

function exportCSV() {
    let csv = "Description,Amount,Category,Date\n";
    transactions.forEach(t=>{
        csv += `${t.text},${t.amount},${t.category},${t.date}\n`;
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "transactions.csv";
    a.click();
}

function toggleDark() {
    darkMode = !darkMode;
    document.body.style.backgroundColor = darkMode ? "black" : "white";
    document.body.style.color = darkMode ? "white" : "black";
}

function save() {
    localStorage.setItem("transactions", JSON.stringify(transactions));
    localStorage.setItem("budgets", JSON.stringify(budgets));
}

function clearFields() {
    document.getElementById("text").value="";
    document.getElementById("amount").value="";
    document.getElementById("date").value="";
}

updateUI();
</script>

</body>
</html>
