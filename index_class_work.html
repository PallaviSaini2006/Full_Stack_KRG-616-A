<div id="uploadBox">
    <input type="file" id="fileInput" hidden>

    <button type="button" id="chooseBtn">
        Choose File
    </button>

    <div id="filePreview" style="display:none;">
        <img id="fileIcon" width="30">
        <span id="fileName"></span>
    </div>
</div>

<style>
#filePreview {
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

#chooseBtn {
    padding: 8px 16px;
    cursor: pointer;
}
</style>

<script>
const fileInput = document.getElementById("fileInput");
const chooseBtn = document.getElementById("chooseBtn");
const filePreview = document.getElementById("filePreview");
const fileName = document.getElementById("fileName");
const fileIcon = document.getElementById("fileIcon");

chooseBtn.onclick = () => fileInput.click();

fileInput.addEventListener("change", function () {
    if (this.files.length > 0) {
        const file = this.files[0];
        fileName.textContent = file.name;

        const ext = file.name.split('.').pop().toLowerCase();

        if (ext === "pdf") {
            fileIcon.src = "https://cdn-icons-png.flaticon.com/512/337/337946.png";
        } else if (ext === "doc" || ext === "docx") {
            fileIcon.src = "https://cdn-icons-png.flaticon.com/512/888/888883.png";
        } else if (ext === "ppt" || ext === "pptx") {
            fileIcon.src = "https://cdn-icons-png.flaticon.com/512/888/888867.png";
        } else {
            fileIcon.src = "https://cdn-icons-png.flaticon.com/512/136/136549.png";
        }

        chooseBtn.style.display = "none";
        filePreview.style.display = "flex";
    }
});
</script>
