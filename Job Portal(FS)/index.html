                { id: "j6", title: "Backend Developer", company: "CloudBase Tech", location: "Pune", type: "Full-time", category: "Technology", salary: "₹12–18 LPA", experience: "3–6 Years", description: "Design and develop high-performance backend APIs. Experience with Node.js, PostgreSQL, and cloud deployments on AWS/GCP required. Lead a small team of junior developers.", requirements: ["Node.js", "PostgreSQL", "AWS", "REST APIs", "TypeScript"], postedBy: "emp1", postedAt: "2026-04-07", deadline: "2026-04-30", logo: "🖥️", applicants: 29, featured: false },
                { id: "j7", title: "Machine Learning Engineer", company: "AI Forge Labs", location: "Bangalore", type: "Full-time", category: "Data Science", salary: "₹18–25 LPA", experience: "2–5 Years", description: "Build and deploy ML models for computer vision and NLP applications. Work on cutting-edge AI research projects with a team of top scientists and engineers.", requirements: ["Python", "TensorFlow", "PyTorch", "MLOps", "Deep Learning"], postedBy: "emp2", postedAt: "2026-04-05", deadline: "2026-05-25", logo: "🤖", applicants: 15, featured: true },
                { id: "j8", title: "HR Recruiter", company: "PeopleFirst HR", location: "Delhi", type: "Part-time", category: "Human Resources", salary: "₹3–5 LPA", experience: "0–2 Years", description: "Source, screen, and recruit candidates for IT roles. Manage end-to-end hiring cycles and build talent pipelines for our growing client base.", requirements: ["Recruitment", "LinkedIn", "ATS Tools", "Communication", "HR Basics"], postedBy: "emp4", postedAt: "2026-04-03", deadline: "2026-04-28", logo: "👥", applicants: 38, featured: false },
                { id: "j9", title: "Full Stack Developer", company: "StartupNest", location: "Remote", type: "Remote", category: "Technology", salary: "₹10–16 LPA", experience: "2–4 Years", description: "Join a fast-paced startup building a B2B SaaS platform. Own features from database design to pixel-perfect UI. Equity + competitive salary.", requirements: ["React", "Node.js", "MongoDB", "Docker", "Git"], postedBy: "emp3", postedAt: "2026-04-02", deadline: "2026-05-18", logo: "🚀", applicants: 52, featured: false },
                { id: "j10", title: "Finance Analyst", company: "WealthBridge Capital", location: "Mumbai", type: "Full-time", category: "Finance", salary: "₹7–11 LPA", experience: "1–3 Years", description: "Perform financial modelling, budgeting, and variance analysis. Support senior analysts with reports and dashboards for management decision-making.", requirements: ["Excel", "Financial Modelling", "Tally", "Accounting", "CA/MBA Finance"], postedBy: "emp5", postedAt: "2026-04-01", deadline: "2026-04-30", logo: "💰", applicants: 44, featured: false },
                { id: "j11", title: "Content Writer", company: "WordCraft Studio", location: "Remote", type: "Remote", category: "Marketing", salary: "₹3–6 LPA", experience: "Fresher", description: "Write SEO-optimised blog posts, articles, and website copy for technology and lifestyle brands. Strong portfolio and passion for storytelling required.", requirements: ["SEO Writing", "Grammar", "Research", "WordPress", "Creativity"], postedBy: "emp4", postedAt: "2026-03-30", deadline: "2026-04-25", logo: "✍️", applicants: 71, featured: false },
                { id: "j12", title: "Cloud Solutions Architect", company: "NexGen Cloud", location: "Hyderabad", type: "Full-time", category: "Technology", salary: "₹22–35 LPA", experience: "5+ Years", description: "Architect enterprise-grade cloud solutions on AWS/Azure. Lead technical teams and engage with C-level stakeholders on digital transformation strategies.", requirements: ["AWS", "Azure", "Solutions Architecture", "DevOps", "Terraform"], postedBy: "emp3", postedAt: "2026-03-28", deadline: "2026-05-10", logo: "☁️", applicants: 18, featured: true }
            ],
            seedUsers: [
                { id: "emp1", name: "Ravi Kumar", email: "ravi@technova.com", password: "emp123", role: "employer", company: "TechNova Solutions", avatar: "RK" },
                { id: "emp2", name: "Priya Singh", email: "priya@dataworks.com", password: "emp123", role: "employer", company: "DataWorks Analytics", avatar: "PS" },
                { id: "emp3", name: "Arun Mehta", email: "arun@xyz.com", password: "emp123", role: "employer", company: "XYZ Solutions", avatar: "AM" },
                { id: "emp4", name: "Sneha Joshi", email: "sneha@creative.com", password: "emp123", role: "employer", company: "CreativeMinds", avatar: "SJ" },
                { id: "emp5", name: "Kiran Reddy", email: "kiran@growthhack.com", password: "emp123", role: "employer", company: "GrowthHack Agency", avatar: "KR" },
                { id: "u1", name: "Arjun Sharma", email: "arjun@gmail.com", password: "user123", role: "seeker", skills: "React, JavaScript, Node.js", avatar: "AS" },
                { id: "u2", name: "Divya Nair", email: "divya@gmail.com", password: "user123", role: "seeker", skills: "Python, Data Science, SQL", avatar: "DN" }
            ],
            seedApplications: [
                { id: "a1", jobId: "j1", userId: "u1", appliedAt: "2026-04-16", status: "Shortlisted", coverLetter: "I am very interested in this role." },
                { id: "a2", jobId: "j2", userId: "u2", appliedAt: "2026-04-15", status: "Under Review", coverLetter: "I love data analytics." }
            ],

            init() {
                if (!localStorage.getItem("ch_initialized")) {
                    localStorage.setItem("ch_jobs", JSON.stringify(this.seedJobs));
                    localStorage.setItem("ch_users", JSON.stringify(this.seedUsers));
                    localStorage.setItem("ch_applications", JSON.stringify(this.seedApplications));
                    localStorage.setItem("ch_bookmarks", JSON.stringify([]));
                    localStorage.setItem("ch_initialized", "true");
                }
            },
            getJobs() { return JSON.parse(localStorage.getItem("ch_jobs") || "[]"); },
            getJob(id) { return this.getJobs().find(j => j.id === id); },
            addJob(job) {
                const jobs = this.getJobs();
                job.id = "j" + Date.now(); job.postedAt = new Date().toISOString().split("T")[0]; job.applicants = 0; job.featured = false;
                jobs.unshift(job); localStorage.setItem("ch_jobs", JSON.stringify(jobs)); return job;
            },
            deleteJob(id) { localStorage.setItem("ch_jobs", JSON.stringify(this.getJobs().filter(j => j.id !== id))); },
            getUsers() { return JSON.parse(localStorage.getItem("ch_users") || "[]"); },
            login(email, password) { return this.getUsers().find(u => u.email === email && u.password === password) || null; },
            register(data) {
                const users = this.getUsers();
                if (users.find(u => u.email === data.email)) return { error: "Email already registered." };
                const user = { id: "u" + Date.now(), ...data, avatar: data.name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2) };
                users.push(user); localStorage.setItem("ch_users", JSON.stringify(users)); return user;
            },
            updateUser(id, updates) { localStorage.setItem("ch_users", JSON.stringify(this.getUsers().map(u => u.id === id ? { ...u, ...updates } : u))); },
            getApplications() { return JSON.parse(localStorage.getItem("ch_applications") || "[]"); },
            getApplicationsByUser(userId) { return this.getApplications().filter(a => a.userId === userId); },
            getApplicationsByJob(jobId) { return this.getApplications().filter(a => a.jobId === jobId); },
            hasApplied(jobId, userId) { return this.getApplications().some(a => a.jobId === jobId && a.userId === userId); },
            apply(jobId, userId, coverLetter, phone) {
                if (this.hasApplied(jobId, userId)) return { error: "Already applied." };
                const apps = this.getApplications();
                const app = { id: "a" + Date.now(), jobId, userId, appliedAt: new Date().toISOString().split("T")[0], status: "Under Review", coverLetter, phone };
                apps.push(app); localStorage.setItem("ch_applications", JSON.stringify(apps));
                localStorage.setItem("ch_jobs", JSON.stringify(this.getJobs().map(j => j.id === jobId ? { ...j, applicants: (j.applicants || 0) + 1 } : j)));
                return app;
            },
            getBookmarks(userId) { return JSON.parse(localStorage.getItem("ch_bookmarks") || "[]").filter(b => b.userId === userId).map(b => b.jobId); },
            toggleBookmark(jobId, userId) {
                let bm = JSON.parse(localStorage.getItem("ch_bookmarks") || "[]");
                const idx = bm.findIndex(b => b.jobId === jobId && b.userId === userId);
                if (idx >= 0) bm.splice(idx, 1); else bm.push({ jobId, userId });
                localStorage.setItem("ch_bookmarks", JSON.stringify(bm)); return idx < 0;
            },
            getSession() { const s = localStorage.getItem("ch_session"); return s ? JSON.parse(s) : null; },
            setSession(user) { localStorage.setItem("ch_session", JSON.stringify(user)); },
            clearSession() { localStorage.removeItem("ch_session"); },
            getStats() { return { totalJobs: this.getJobs().length, totalUsers: this.getUsers().filter(u => u.role === "seeker").length, totalEmployers: this.getUsers().filter(u => u.role === "employer").length, totalApplications: this.getApplications().length }; }
        };

        /* ============================================================
           NAVBAR
           ============================================================ */
        function Navbar({ user, onNavigate, onLogout, onAuthOpen, currentView }) {
            const [menuOpen, setMenuOpen] = React.useState(false);
            const [scrolled, setScrolled] = React.useState(false);
            React.useEffect(() => {
                const h = () => setScrolled(window.scrollY > 20);
                window.addEventListener("scroll", h); return () => window.removeEventListener("scroll", h);
            }, []);
            const navLinks = [{ label: "Home", view: "home" }, { label: "Jobs", view: "jobs" }, { label: "Internships", view: "internships" }, { label: "Companies", view: "companies" }];
            return (
                <nav className={`navbar ${scrolled ? "navbar-scrolled" : ""}`}>
                    <div className="nav-container">
                        <div className="nav-logo" onClick={() => onNavigate("home")}>
                            <span className="logo-icon">💼</span>
                            <span className="logo-text">Career<span className="logo-accent">Hub</span></span>
                        </div>
                        <ul className={`nav-links ${menuOpen ? "nav-links-open" : ""}`}>
                            {navLinks.map(link => (
                                <li key={link.view}>
                                    <a href="#" className={`nav-link ${currentView === link.view ? "nav-link-active" : ""}`}
                                        onClick={e => { e.preventDefault(); onNavigate(link.view); setMenuOpen(false); }}>{link.label}</a>
                                </li>
                            ))}
                            {user && <li><a href="#" className={`nav-link ${currentView === "dashboard" ? "nav-link-active" : ""}`} onClick={e => { e.preventDefault(); onNavigate("dashboard"); setMenuOpen(false); }}>{user.role === "employer" ? "My Jobs" : "Dashboard"}</a></li>}
                            {user && user.role === "employer" && <li><a href="#" className={`nav-link ${currentView === "postjob" ? "nav-link-active" : ""}`} onClick={e => { e.preventDefault(); onNavigate("postjob"); setMenuOpen(false); }}>Post a Job</a></li>}
                        </ul>
                        <div className="nav-auth">
                            {user ? (
                                <div className="nav-user-menu">
                                    <div className="nav-avatar" title={user.name}>{user.avatar}</div>
                                    <div className="nav-dropdown">
                                        <div className="dropdown-info">
                                            <span className="dropdown-name">{user.name}</span>
                                            <span className="dropdown-role">{user.role === "employer" ? "Employer" : "Job Seeker"}</span>
                                        </div>
                                        <button className="dropdown-item" onClick={() => onNavigate("dashboard")}><i className="fa fa-tachometer-alt"></i> Dashboard</button>
                                        {user.role === "employer" && <button className="dropdown-item" onClick={() => onNavigate("postjob")}><i className="fa fa-plus-circle"></i> Post Job</button>}
                                        <button className="dropdown-item dropdown-logout" onClick={onLogout}><i className="fa fa-sign-out-alt"></i> Logout</button>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <button className="btn btn-outline" onClick={() => onAuthOpen("login")}>Login</button>
                                    <button className="btn btn-primary" onClick={() => onAuthOpen("register")}>Register</button>
                                </>
                            )}
                            <button className="hamburger" onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
                                <span></span><span></span><span></span>
                            </button>
                        </div>
                    </div>
                </nav>
            );
        }

        /* ============================================================
           AUTH MODAL
           ============================================================ */
        function AuthModal({ mode, onClose, onLogin }) {
            const [view, setView] = React.useState(mode);
            const [form, setForm] = React.useState({ name: "", email: "", password: "", role: "seeker", company: "", skills: "" });
            const [error, setError] = React.useState("");
            const [loading, setLoading] = React.useState(false);
            const [success, setSuccess] = React.useState("");
            const h = e => { setForm({ ...form, [e.target.name]: e.target.value }); setError(""); };
            const handleLogin = e => {
                e.preventDefault(); setLoading(true);
                setTimeout(() => {
                    const user = DB.login(form.email, form.password);
                    setLoading(false);
                    if (user) { DB.setSession(user); onLogin(user); }
                    else setError("Invalid credentials. Try: arjun@gmail.com / user123");
                }, 600);
            };
            const handleRegister = e => {
                e.preventDefault();
                if (!form.name || !form.email || !form.password) { setError("Please fill all required fields."); return; }
                if (form.password.length < 6) { setError("Password must be at least 6 characters."); return; }
                if (form.role === "employer" && !form.company) { setError("Company name is required."); return; }
                setLoading(true);
                setTimeout(() => {
                    const result = DB.register(form); setLoading(false);
                    if (result.error) setError(result.error);
                    else { setSuccess("Account created! Logging you in..."); setTimeout(() => { DB.setSession(result); onLogin(result); }, 1000); }
                }, 700);
            };
            return (
                <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="modal-box auth-modal">
                        <button className="modal-close" onClick={onClose}>✕</button>
                        <div className="auth-tabs">
                            <button className={`auth-tab ${view === "login" ? "auth-tab-active" : ""}`} onClick={() => { setView("login"); setError(""); }}>Login</button>
                            <button className={`auth-tab ${view === "register" ? "auth-tab-active" : ""}`} onClick={() => { setView("register"); setError(""); }}>Register</button>
                        </div>
                        {view === "login" ? (
                            <form className="auth-form" onSubmit={handleLogin}>
                                <div className="auth-logo">💼 CareerHub</div>
                                <p className="auth-subtitle">Welcome back! Sign in to continue.</p>
                                <div className="demo-hint"><strong>Demo accounts:</strong><br />👤 arjun@gmail.com / user123 (Job Seeker)<br />🏢 ravi@technova.com / emp123 (Employer)</div>
                                {error && <div className="form-error"><i className="fa fa-exclamation-circle"></i> {error}</div>}
                                <div className="form-group"><label>Email Address</label>
                                    <div className="input-wrap"><i className="fa fa-envelope input-icon"></i><input name="email" type="email" placeholder="your@email.com" value={form.email} onChange={h} required /></div></div>
                                <div className="form-group"><label>Password</label>
                                    <div className="input-wrap"><i className="fa fa-lock input-icon"></i><input name="password" type="password" placeholder="Your password" value={form.password} onChange={h} required /></div></div>
                                <button type="submit" className={`btn btn-primary btn-full ${loading ? "btn-loading" : ""}`} disabled={loading}>
                                    {loading ? <span className="spinner"></span> : "Sign In"}</button>
                                <p className="auth-switch">No account? <span onClick={() => setView("register")}>Register here</span></p>
                            </form>
                        ) : (
                            <form className="auth-form" onSubmit={handleRegister}>
                                <div className="auth-logo">💼 CareerHub</div>
                                <p className="auth-subtitle">Create your free account today.</p>
                                {error && <div className="form-error"><i className="fa fa-exclamation-circle"></i> {error}</div>}
                                {success && <div className="form-success"><i className="fa fa-check-circle"></i> {success}</div>}
                                <div className="role-selector">
                                    <button type="button" className={`role-btn ${form.role === "seeker" ? "role-active" : ""}`} onClick={() => setForm({ ...form, role: "seeker" })}><span>👨‍💼</span> Job Seeker</button>
                                    <button type="button" className={`role-btn ${form.role === "employer" ? "role-active" : ""}`} onClick={() => setForm({ ...form, role: "employer" })}><span>🏢</span> Employer</button>
                                </div>
                                <div className="form-group"><label>Full Name *</label>
                                    <div className="input-wrap"><i className="fa fa-user input-icon"></i><input name="name" type="text" placeholder="Your full name" value={form.name} onChange={h} required /></div></div>
                                <div className="form-group"><label>Email Address *</label>
                                    <div className="input-wrap"><i className="fa fa-envelope input-icon"></i><input name="email" type="email" placeholder="your@email.com" value={form.email} onChange={h} required /></div></div>
                                <div className="form-group"><label>Password *</label>
                                    <div className="input-wrap"><i className="fa fa-lock input-icon"></i><input name="password" type="password" placeholder="Min. 6 characters" value={form.password} onChange={h} required /></div></div>
                                {form.role === "employer"
                                    ? <div className="form-group"><label>Company Name *</label><div className="input-wrap"><i className="fa fa-building input-icon"></i><input name="company" type="text" placeholder="Your company" value={form.company} onChange={h} /></div></div>
                                    : <div className="form-group"><label>Skills (optional)</label><div className="input-wrap"><i className="fa fa-code input-icon"></i><input name="skills" type="text" placeholder="React, Python, SQL..." value={form.skills} onChange={h} /></div></div>}
                                <button type="submit" className={`btn btn-primary btn-full ${loading ? "btn-loading" : ""}`} disabled={loading}>
                                    {loading ? <span className="spinner"></span> : "Create Account"}</button>
                                <p className="auth-switch">Have an account? <span onClick={() => setView("login")}>Sign in</span></p>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        /* ============================================================
           HERO
           ============================================================ */
        function Hero({ onNavigate, user }) {
            const [count, setCount] = React.useState({ jobs: 0, companies: 0, placed: 0 });
            const [searchQ, setSearchQ] = React.useState("");
            const [loc, setLoc] = React.useState("");
            React.useEffect(() => {
                const targets = { jobs: 1200, companies: 350, placed: 8500 };
                let step = 0; const steps = 60; const timer = setInterval(() => {
                    step++; const p = step / steps;
                    setCount({ jobs: Math.floor(targets.jobs * p), companies: Math.floor(targets.companies * p), placed: Math.floor(targets.placed * p) });
                    if (step >= steps) clearInterval(timer);
                }, 33); return () => clearInterval(timer);
            }, []);
            const handleSearch = e => { e.preventDefault(); onNavigate("jobs", { query: searchQ, location: loc }); };
            const categories = [{ icon: "💻", label: "Technology" }, { icon: "📊", label: "Data Science" }, { icon: "🎨", label: "Design" }, { icon: "📢", label: "Marketing" }, { icon: "💰", label: "Finance" }, { icon: "👥", label: "Human Resources" }];
            return (
                <section className="hero-wrap">
                    <div className="hero-inner">
                        <div className="hero-bg">
                            <div className="hero-blob hero-blob-1"></div>
                            <div className="hero-blob hero-blob-2"></div>
                            <div className="hero-blob hero-blob-3"></div>
                        </div>
                        <div className="hero-content">
                            <div className="hero-badge"><span className="badge-dot"></span><span>🔥 1,200+ Active Job Listings</span></div>
                            <h1 className="hero-title">Find Your <span className="hero-highlight">Dream Career</span><br />With CareerHub</h1>
                            <p className="hero-subtitle">India's fastest-growing job portal connecting talented professionals with top companies. Discover opportunities that match your ambition.</p>
                            <form className="hero-search" onSubmit={handleSearch}>
                                <div className="search-field sf-pad">
                                    <i className="fa fa-search search-icon"></i>
                                    <input type="text" placeholder="Job title, skills, keywords..." value={searchQ} onChange={e => setSearchQ(e.target.value)} />

                                <div className="hcard-info">

                                    <span className="hcard-company">AI Forge Labs • Bangalore</span>
                                    <span className="hcard-salary">₹18–25 LPA</span>

                    <div className="category-section">
