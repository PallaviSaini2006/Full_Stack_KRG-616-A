        /* ============================================================
           JOB CARD
           ============================================================ */
        function JobCard({ job, user, onApply, onViewDetail, bookmarks, onToggleBookmark }) {
            const isBookmarked = bookmarks && bookmarks.includes(job.id);
            const hasApplied = user ? DB.hasApplied(job.id, user.id) : false;
            const typeColors = { "Full-time": "#10b981", "Part-time": "#f59e0b", "Remote": "#6366f1", "Internship": "#ec4899" };
            return (
                <div className={`job-card-new ${job.featured ? "job-featured" : ""}`}>
                    {job.featured && <div className="featured-badge">⭐ Featured</div>}
                    <div className="jc-header">
                        <div className="jc-logo">{job.logo}</div>
                        <div className="jc-title-wrap">
                            <h3 className="jc-title" onClick={() => onViewDetail(job)}>{job.title}</h3>
                            <span className="jc-company">{job.company}</span>
                        </div>
                        {user && <button className={`bookmark-btn ${isBookmarked ? "bookmarked" : ""}`} onClick={() => onToggleBookmark(job.id)} title="Save job">{isBookmarked ? "🔖" : "🏷️"}</button>}
                    </div>
                    <div className="jc-meta">
                        <span className="jc-tag"><i className="fa fa-map-marker-alt"></i> {job.location}</span>
                        <span className="jc-tag" style={{ color: typeColors[job.type] || "#6b7280", borderColor: typeColors[job.type] || "#6b7280" }}>{job.type}</span>
                        <span className="jc-tag"><i className="fa fa-briefcase"></i> {job.experience}</span>
                    </div>
                    <p className="jc-desc">{job.description.slice(0, 110)}...</p>
                    <div className="jc-skills">
                        {job.requirements.slice(0, 3).map(r => <span key={r} className="skill-pill">{r}</span>)}
                        {job.requirements.length > 3 && <span className="skill-pill skill-pill-more">+{job.requirements.length - 3}</span>}
                    </div>
                    <div className="jc-footer">
                        <div className="jc-salary"><i className="fa fa-rupee-sign"></i><span>{job.salary}</span></div>
                        <div className="jc-actions">
                            <button className="btn btn-outline btn-sm" onClick={() => onViewDetail(job)}>Details</button>
                            {hasApplied
                                ? <button className="btn btn-success btn-sm" disabled>✓ Applied</button>
                                : <button className="btn btn-primary btn-sm" onClick={() => onApply(job)}>Apply Now</button>}
                        </div>
                    </div>
                    <div className="jc-bottom-bar">
                        <span className="jc-posted">📅 {job.postedAt}</span>
                        <span className="jc-applicants">👤 {job.applicants} applicants</span>
                    </div>
                </div>
            );
        }

        /* ============================================================
           APPLY MODAL
           ============================================================ */
        function ApplyModal({ job, user, onClose, onSuccess }) {
            const [form, setForm] = React.useState({ phone: "", coverLetter: "" });
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState("");
            const handleSubmit = e => {
                e.preventDefault();
                if (!user) { setError("Please login to apply."); return; }
                if (!form.phone) { setError("Phone number is required."); return; }
                setLoading(true);
                setTimeout(() => {
                    const result = DB.apply(job.id, user.id, form.coverLetter, form.phone);
                    setLoading(false);
                    if (result.error) setError(result.error); else onSuccess(job);
                }, 700);
            };
            return (
                <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="modal-box apply-modal">
                        <button className="modal-close" onClick={onClose}>✕</button>
                        <div className="apply-header">
                            <span className="apply-logo">{job.logo}</span>
                            <div><h2 className="apply-title">Apply for {job.title}</h2><p className="apply-company">{job.company} · {job.location}</p></div>
                        </div>
                        {error && <div className="form-error" style={{ margin: "0 28px 0" }}><i className="fa fa-exclamation-circle"></i> {error}</div>}
                        <form onSubmit={handleSubmit} className="auth-form">
                            <div className="form-group"><label>Full Name</label>
                                <div className="input-wrap"><i className="fa fa-user input-icon"></i><input type="text" value={user ? user.name : ""} readOnly style={{ background: "#f9f9f9" }} /></div></div>
                            <div className="form-group"><label>Email</label>
                                <div className="input-wrap"><i className="fa fa-envelope input-icon"></i><input type="email" value={user ? user.email : ""} readOnly style={{ background: "#f9f9f9" }} /></div></div>
                            <div className="form-group"><label>Phone Number *</label>
                                <div className="input-wrap"><i className="fa fa-phone input-icon"></i><input type="tel" placeholder="+91 XXXXX XXXXX" value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} required /></div></div>
                            <div className="form-group"><label>Cover Letter (optional)</label>
                                <textarea placeholder="Tell the employer why you're a great fit..." value={form.coverLetter} onChange={e => setForm({ ...form, coverLetter: e.target.value })} rows="4"
                                    style={{ width: "100%", padding: "10px 14px", borderRadius: "8px", border: "1.5px solid #e5e7eb", fontSize: "14px", resize: "vertical", fontFamily: "inherit", outline: "none" }} /></div>
                            <button type="submit" className={`btn btn-primary btn-full ${loading ? "btn-loading" : ""}`} disabled={loading}>
                                {loading ? <span className="spinner"></span> : <><i className="fa fa-paper-plane"></i> Submit Application</>}</button>
                        </form>
                    </div>
                </div>
            );
        }

        /* ============================================================
           JOB DETAIL MODAL
           ============================================================ */
        function JobDetailModal({ job, user, onClose, onApply, bookmarks, onToggleBookmark }) {
            const isBookmarked = bookmarks && bookmarks.includes(job.id);
            const hasApplied = user ? DB.hasApplied(job.id, user.id) : false;
            return (
                <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="modal-box detail-modal">
                        <button className="modal-close" onClick={onClose}>✕</button>
                        <div className="detail-header">
                            <span className="detail-logo">{job.logo}</span>
                            <div className="detail-title-wrap"><h2>{job.title}</h2><p className="detail-company">{job.company}</p></div>
                            {user && <button className={`bookmark-btn ${isBookmarked ? "bookmarked" : ""}`} onClick={() => onToggleBookmark(job.id)}>{isBookmarked ? "🔖 Saved" : "🏷️ Save"}</button>}
                        </div>
                        <div className="detail-tags">
                            <span className="jc-tag"><i className="fa fa-map-marker-alt"></i> {job.location}</span>
                            <span className="jc-tag">{job.type}</span>
                            <span className="jc-tag"><i className="fa fa-briefcase"></i> {job.experience}</span>
                            <span className="jc-tag"><i className="fa fa-users"></i> {job.applicants} Applicants</span>
                            <span className="jc-tag"><i className="fa fa-calendar"></i> Deadline: {job.deadline}</span>
                        </div>
                        <div className="detail-salary-box"><i className="fa fa-money-bill-wave" style={{ color: "#10b981" }}></i><span className="detail-salary">{job.salary}</span><span className="salary-label">Per Annum / Stipend</span></div>
                        <div className="detail-section"><h3>Job Description</h3><p>{job.description}</p></div>
                        <div className="detail-section"><h3>Required Skills</h3><div className="jc-skills" style={{ marginTop: "10px" }}>{job.requirements.map(r => <span key={r} className="skill-pill">{r}</span>)}</div></div>
                        <div className="detail-section"><h3>About {job.company}</h3><p><strong>{job.company}</strong> is a leading organisation in the {job.category} sector, committed to innovation, quality, and employee growth. Join us and be part of something meaningful.</p></div>
                        <div className="detail-actions">
                            {hasApplied
                                ? <button className="btn btn-success btn-lg" disabled>✓ Already Applied</button>
                                : <button className="btn btn-primary btn-lg" onClick={() => onApply(job)}><i className="fa fa-paper-plane"></i> Apply Now</button>}
                            <button className="btn btn-outline btn-lg" onClick={onClose}>Close</button>
                        </div>
                    </div>
                </div>
            );
        }

        /* ============================================================
           JOB LIST PAGE
           ============================================================ */
        function JobList({ user, onAuthOpen, initialFilters, onNavigate }) {
            const [jobs, setJobs] = React.useState([]);
            const [bookmarks, setBookmarks] = React.useState([]);
            const [search, setSearch] = React.useState(initialFilters?.query || "");
            const [location, setLocation] = React.useState(initialFilters?.location || "");
            const [category, setCategory] = React.useState(initialFilters?.category || "");
            const [jobType, setJobType] = React.useState("");
            const [experience, setExperience] = React.useState("");
            const [sortBy, setSortBy] = React.useState("recent");
            const [page, setPage] = React.useState(1);
            const [selectedJob, setSelectedJob] = React.useState(null);
            const [applyJob, setApplyJob] = React.useState(null);
            const [toast, setToast] = React.useState(null);
            const PER_PAGE = 6;

            React.useEffect(() => { setJobs(DB.getJobs()); if (user) setBookmarks(DB.getBookmarks(user.id)); }, [user]);
            React.useEffect(() => {
                if (initialFilters) {
                    if (initialFilters.query) setSearch(initialFilters.query);
                    if (initialFilters.category) setCategory(initialFilters.category);
                    if (initialFilters.location) setLocation(initialFilters.location);
                }
            }, [initialFilters]);

            const showToast = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };
            const handleApply = job => { if (!user) { onAuthOpen("login"); return; } setApplyJob(job); setSelectedJob(null); };
            const handleApplySuccess = job => { setApplyJob(null); showToast(`🎉 Application submitted for ${job.title}!`); setJobs(DB.getJobs()); };
            const handleToggleBookmark = jobId => { if (!user) { onAuthOpen("login"); return; } const added = DB.toggleBookmark(jobId, user.id); setBookmarks(DB.getBookmarks(user.id)); showToast(added ? "🔖 Job saved!" : "Bookmark removed."); };
            const clearFilters = () => { setSearch(""); setLocation(""); setCategory(""); setJobType(""); setExperience(""); setPage(1); };

            let filtered = jobs.filter(j => {
                const q = search.toLowerCase();
                const mQ = !q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.requirements.some(r => r.toLowerCase().includes(q)) || j.category.toLowerCase().includes(q);
                return mQ && (!location || j.location === location) && (!category || j.category === category) && (!jobType || j.type === jobType) && (!experience || j.experience === experience);
            });
            if (sortBy === "recent") filtered.sort((a, b) => new Date(b.postedAt) - new Date(a.postedAt));
            else if (sortBy === "applicants") filtered.sort((a, b) => b.applicants - a.applicants);
            else if (sortBy === "featured") filtered.sort((a, b) => b.featured - a.featured);

            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            const paginated = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

            return (
                <div className="joblist-page">
                    {toast && <div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
                    {applyJob && <ApplyModal job={applyJob} user={user} onClose={() => setApplyJob(null)} onSuccess={handleApplySuccess} />}
                    {selectedJob && <JobDetailModal job={selectedJob} user={user} onClose={() => setSelectedJob(null)} onApply={handleApply} bookmarks={bookmarks} onToggleBookmark={handleToggleBookmark} />}

                    <div className="joblist-header">
                        <h1 className="joblist-title">Browse <span className="text-accent">All Jobs</span></h1>
                        <p className="joblist-subtitle">Discover {jobs.length}+ opportunities matching your skills</p>
                    </div>
                    <div className="joblist-search">
                        <div className="search-field"><i className="fa fa-search search-icon"></i><input type="text" placeholder="Search jobs, skills, companies..." value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} /></div>
                        <div className="search-field"><i className="fa fa-map-marker-alt search-icon"></i>
                            <select value={location} onChange={e => { setLocation(e.target.value); setPage(1); }}>
                                <option value="">All Locations</option>
                                {["Bangalore", "Mumbai", "Delhi", "Hyderabad", "Chennai", "Pune", "Remote"].map(l => <option key={l}>{l}</option>)}
                            </select></div>
                        <button className="btn btn-primary" onClick={() => setPage(1)}><i className="fa fa-search"></i> Search</button>
                    </div>
                    <div className="joblist-body">
                        <aside className="filter-sidebar">
                            <div className="filter-header"><h3>Filters</h3><button className="clear-btn" onClick={clearFilters}>Clear All</button></div>
                            <div className="filter-group">
                                <label className="filter-label">Category</label>
                                {["Technology", "Data Science", "Design", "Marketing", "Finance", "Human Resources"].map(c => (
                                    <label key={c} className="filter-check"><input type="radio" name="cat" checked={category === c} onChange={() => { setCategory(c); setPage(1); }} /><span>{c}</span></label>
                                ))}
                                <label className="filter-check"><input type="radio" name="cat" checked={category === ""} onChange={() => { setCategory(""); setPage(1); }} /><span>All Categories</span></label>
                            </div>
                            <div className="filter-group">
                                <label className="filter-label">Job Type</label>
                                {["Full-time", "Part-time", "Remote", "Internship"].map(t => (
                                    <label key={t} className="filter-check"><input type="radio" name="jt" checked={jobType === t} onChange={() => { setJobType(t); setPage(1); }} /><span>{t}</span></label>
                                ))}
                                <label className="filter-check"><input type="radio" name="jt" checked={jobType === ""} onChange={() => { setJobType(""); setPage(1); }} /><span>All Types</span></label>
                            </div>
                            <div className="filter-group">
                                <label className="filter-label">Experience</label>
                                {["Fresher", "0–2 Years", "1–3 Years", "2–5 Years", "3–6 Years", "5+ Years"].map(e => (
                                    <label key={e} className="filter-check"><input type="radio" name="exp" checked={experience === e} onChange={() => { setExperience(e); setPage(1); }} /><span>{e}</span></label>
                                ))}
                                <label className="filter-check"><input type="radio" name="exp" checked={experience === ""} onChange={() => { setExperience(""); setPage(1); }} /><span>Any Experience</span></label>
                            </div>
                        </aside>
                        <div className="jobs-main">
                            <div className="jobs-toolbar">
                                <span className="results-count">Showing <strong>{filtered.length}</strong> jobs</span>
                                <div className="sort-wrap"><label>Sort:</label>
                                    <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
                                        <option value="recent">Most Recent</option>
                                        <option value="applicants">Most Applied</option>
                                        <option value="featured">Featured First</option>
                                    </select></div>
                            </div>
                            {paginated.length === 0 ? (
                                <div className="empty-state"><span style={{ fontSize: "3rem" }}>🔍</span><h3>No jobs found</h3><p>Try different keywords or clear filters.</p>
                                    <button className="btn btn-primary" onClick={clearFilters}>Clear Filters</button></div>
                            ) : (
                                <div className="jobs-grid">
                                    {paginated.map(job => <JobCard key={job.id} job={job} user={user} onApply={handleApply} onViewDetail={setSelectedJob} bookmarks={bookmarks} onToggleBookmark={handleToggleBookmark} />)}
                                </div>
                            )}
                            {totalPages > 1 && (
                                <div className="pagination">
                                    <button className="page-btn" onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}>‹ Prev</button>
                                    {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
                                        <button key={p} className={`page-btn ${p === page ? "page-active" : ""}`} onClick={() => setPage(p)}>{p}</button>
                                    ))}
                                    <button className="page-btn" onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}>Next ›</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        /* ============================================================
           SEEKER DASHBOARD
           ============================================================ */
        function SeekerDashboard({ user, onNavigate }) {
            const [tab, setTab] = React.useState("applied");
            const [applications, setApplications] = React.useState([]);
            const [bookmarkedJobs, setBookmarkedJobs] = React.useState([]);
            const [profile, setProfile] = React.useState({ ...user });
            const [editMode, setEditMode] = React.useState(false);
            const [toast, setToast] = React.useState("");
            const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 3000); };
            React.useEffect(() => {
                const apps = DB.getApplicationsByUser(user.id);
                const jobs = DB.getJobs();
                setApplications(apps.map(a => ({ ...a, job: jobs.find(j => j.id === a.jobId) })));
                const bIds = DB.getBookmarks(user.id);
                setBookmarkedJobs(jobs.filter(j => bIds.includes(j.id)));
            }, [user]);
            const handleSave = () => { DB.updateUser(user.id, profile); setEditMode(false); showToast("✅ Profile updated!"); };
            const statusColor = { "Under Review": "#f59e0b", "Shortlisted": "#10b981", "Rejected": "#ef4444", "Hired": "#6366f1" };
            return (
                <div className="dashboard-page">
                    {toast && <div className="toast toast-success">{toast}</div>}
                    <div className="dashboard-hero">
                        <div className="dash-avatar">{user.avatar}</div>
                        <div className="dash-info"><h1>Welcome, {user.name}! 👋</h1><p>{user.email} · Job Seeker</p>{user.skills && <p className="dash-skills">Skills: {user.skills}</p>}</div>
                        <div className="dash-stats">
                            <div className="dash-stat"><span>{applications.length}</span><label>Applied</label></div>
                            <div className="dash-stat"><span>{bookmarkedJobs.length}</span><label>Saved</label></div>
                            <div className="dash-stat"><span>{applications.filter(a => a.status === "Shortlisted").length}</span><label>Shortlisted</label></div>
                        </div>
                    </div>
                    <div className="dash-tabs">
                        {[["applied", "📋 Applications"], ["saved", "🔖 Saved Jobs"], ["profile", "👤 My Profile"]].map(([k, l]) => (
                            <button key={k} className={`dash-tab ${tab === k ? "dash-tab-active" : ""}`} onClick={() => setTab(k)}>{l}</button>
                        ))}
                    </div>
                    {tab === "applied" && (
                        <div className="dash-content">
                            {applications.length === 0 ? (
                                <div className="empty-state"><span style={{ fontSize: "3rem" }}>📋</span><h3>No applications yet</h3><p>Start exploring jobs!</p>
                                    <button className="btn btn-primary" onClick={() => onNavigate("jobs")}>Browse Jobs</button></div>
                            ) : (
                                <div className="applications-list">
                                    {applications.map(app => app.job && (
                                        <div key={app.id} className="app-card">
                                            <div className="app-logo">{app.job.logo}</div>
                                            <div className="app-info">
                                                <h4 className="app-title">{app.job.title}</h4>
                                                <span className="app-company">{app.job.company} · {app.job.location}</span>
                                                <span className="app-date">Applied: {app.appliedAt}</span>
                                            </div>
                                            <div className="app-right">
                                                <span className="app-status" style={{ background: statusColor[app.status] + "22", color: statusColor[app.status] }}>{app.status}</span>
                                                <span className="app-salary">{app.job.salary}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                    {tab === "saved" && (
                        <div className="dash-content">
                            {bookmarkedJobs.length === 0 ? (
                                <div className="empty-state"><span style={{ fontSize: "3rem" }}>🔖</span><h3>No saved jobs</h3><p>Bookmark jobs you like!</p>
                                    <button className="btn btn-primary" onClick={() => onNavigate("jobs")}>Explore Jobs</button></div>
                            ) : (
                                <div className="jobs-grid">
                                    {bookmarkedJobs.map(job => (
                                        <div key={job.id} className="job-card-new">
                                            <div className="jc-header"><div className="jc-logo">{job.logo}</div><div className="jc-title-wrap"><h3 className="jc-title">{job.title}</h3><span className="jc-company">{job.company}</span></div></div>
                                            <div className="jc-meta"><span className="jc-tag">{job.location}</span><span className="jc-tag">{job.type}</span></div>
                                            <div className="jc-footer"><span className="jc-salary">{job.salary}</span><button className="btn btn-primary btn-sm" onClick={() => onNavigate("jobs")}>View &amp; Apply</button></div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                    {tab === "profile" && (
                        <div className="dash-content">
                            <div className="profile-card">
                                <div className="profile-avatar-big">{user.avatar}</div>
                                {editMode ? (
                                    <div className="profile-form">
                                        <div className="form-group"><label>Full Name</label><input type="text" value={profile.name} onChange={e => setProfile({ ...profile, name: e.target.value })} className="profile-input" /></div>
                                        <div className="form-group"><label>Email</label><input type="email" value={profile.email} readOnly className="profile-input" style={{ background: "#f3f4f6" }} /></div>
                                        <div className="form-group"><label>Skills</label><input type="text" value={profile.skills || ""} onChange={e => setProfile({ ...profile, skills: e.target.value })} className="profile-input" placeholder="React, Python..." /></div>
                                        <div className="form-group"><label>New Password</label><input type="password" value={profile.password} onChange={e => setProfile({ ...profile, password: e.target.value })} className="profile-input" /></div>
                                        <div style={{ display: "flex", gap: "12px" }}>
                                            <button className="btn btn-primary" onClick={handleSave}>Save Changes</button>
                                            <button className="btn btn-outline" onClick={() => setEditMode(false)}>Cancel</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="profile-display">
                                        <h2>{user.name}</h2>
                                        <p className="profile-email">{user.email}</p>
                                        <p className="profile-role">Role: Job Seeker</p>
                                        {user.skills && <p className="profile-skills">Skills: <strong>{user.skills}</strong></p>}
                                        <button className="btn btn-primary" style={{ marginTop: "20px" }} onClick={() => setEditMode(true)}><i className="fa fa-edit"></i> Edit Profile</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ============================================================
           EMPLOYER DASHBOARD
           ============================================================ */
        function EmployerDashboard({ user, onNavigate }) {
            const [myJobs, setMyJobs] = React.useState([]);
            const [selectedApps, setSelectedApps] = React.useState(null);
            const [toast, setToast] = React.useState("");
            const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 3000); };
            React.useEffect(() => { setMyJobs(DB.getJobs().filter(j => j.postedBy === user.id)); }, [user]);
            const handleDelete = id => {
                if (window.confirm("Delete this job posting?")) { DB.deleteJob(id); setMyJobs(DB.getJobs().filter(j => j.postedBy === user.id)); showToast("Job deleted."); }
            };
            const viewApps = job => {
                const apps = DB.getApplicationsByJob(job.id);
                const users = DB.getUsers();
                setSelectedApps({ job, apps: apps.map(a => ({ ...a, applicant: users.find(u => u.id === a.userId) })) });
            };
            const total = myJobs.reduce((s, j) => s + (j.applicants || 0), 0);
            return (
                <div className="dashboard-page">
                    {toast && <div className="toast toast-success">{toast}</div>}
                    <div className="dashboard-hero employer-hero">
                        <div className="dash-avatar employer-avatar">{user.avatar}</div>
                        <div className="dash-info"><h1>Welcome, {user.name}! 🏢</h1><p>{user.company} · Employer Account</p></div>
                        <div className="dash-stats">
                            <div className="dash-stat"><span>{myJobs.length}</span><label>Jobs Posted</label></div>
                            <div className="dash-stat"><span>{total}</span><label>Total Applicants</label></div>
                            <div className="dash-stat"><span>{myJobs.filter(j => j.featured).length}</span><label>Featured</label></div>
                        </div>
                    </div>
                    <div className="dash-tabs">
                        <button className="dash-tab dash-tab-active">My Job Posts</button>
                        <button className="dash-tab" onClick={() => onNavigate("postjob")}>+ Post New Job</button>
                    </div>
                    <div className="dash-content">
                        {selectedApps ? (
                            <div>
                                <button className="btn btn-outline" style={{ marginBottom: "20px" }} onClick={() => setSelectedApps(null)}>← Back to My Jobs</button>
                                <h3 style={{ marginBottom: "16px" }}>Applicants for: <strong>{selectedApps.job.title}</strong></h3>
                                {selectedApps.apps.length === 0 ? <div className="empty-state"><span>👤</span><h3>No applicants yet</h3></div> : (
                                    <div className="applicants-table-wrap">
                                        <table className="applicants-table">
                                            <thead><tr><th>Name</th><th>Email</th><th>Applied On</th><th>Status</th><th>Cover Letter</th></tr></thead>
                                            <tbody>
                                                {selectedApps.apps.map(app => (
                                                    <tr key={app.id}>
                                                        <td><strong>{app.applicant?.name || "Unknown"}</strong></td>
                                                        <td>{app.applicant?.email || "—"}</td>
                                                        <td>{app.appliedAt}</td>
                                                        <td><span className="app-status" style={{ background: "#d1fae5", color: "#065f46" }}>{app.status}</span></td>
                                                        <td style={{ fontSize: "12px", color: "#6b7280" }}>{(app.coverLetter || "").slice(0, 60) || "—"}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        ) : myJobs.length === 0 ? (
                            <div className="empty-state"><span style={{ fontSize: "3rem" }}>📝</span><h3>No jobs posted yet</h3><p>Start hiring today!</p>
                                <button className="btn btn-primary" onClick={() => onNavigate("postjob")}>Post a Job</button></div>
                        ) : (
                            <div className="employer-jobs-list">
                                {myJobs.map(job => (
                                    <div key={job.id} className="employer-job-card">
                                        <div className="ejc-left">
                                            <span className="ejc-logo">{job.logo}</span>
                                            <div><h4 className="ejc-title">{job.title}</h4>
                                                <span className="ejc-meta">{job.type} · {job.location} · {job.salary}</span>
                                                <span className="ejc-date">Posted: {job.postedAt} · Deadline: {job.deadline}</span>
                                            </div>
                                        </div>
                                        <div className="ejc-right">
                                            <span className="ejc-applicants">{job.applicants} Applicants</span>
                                            <button className="btn btn-outline btn-sm" onClick={() => viewApps(job)}>View Applicants</button>
                                            <button className="btn btn-danger btn-sm" onClick={() => handleDelete(job.id)}>Delete</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Dashboard({ user, onNavigate, onAuthOpen }) {
            if (!user) return (
                <div className="empty-state" style={{ minHeight: "60vh" }}>
                    <span style={{ fontSize: "3rem" }}>🔐</span><h3>Please log in to view your dashboard</h3>
                    <button className="btn btn-primary" onClick={() => onAuthOpen("login")}>Login</button>
                </div>
            );
            if (user.role === "employer") return <EmployerDashboard user={user} onNavigate={onNavigate} />;
            return <SeekerDashboard user={user} onNavigate={onNavigate} />;
        }

        /* ============================================================
           POST JOB
           ============================================================ */
        function PostJob({ user, onNavigate, onAuthOpen }) {
            const [form, setForm] = React.useState({ title: "", company: user?.company || "", location: "", type: "Full-time", category: "Technology", salary: "", experience: "0–2 Years", description: "", requirements: "", deadline: "", logo: "💼" });
            const [success, setSuccess] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState("");
            const logos = ["💼", "💻", "📊", "🎨", "📢", "💰", "👥", "🚀", "⚙️", "🤖", "☁️", "✍️"];
            const h = e => { setForm({ ...form, [e.target.name]: e.target.value }); setError(""); };
            if (!user || user.role !== "employer") return (
                <div className="empty-state" style={{ minHeight: "60vh" }}>
                    <span style={{ fontSize: "3rem" }}>🔒</span><h3>Employer Access Only</h3>
                    <p>Register or login as an Employer to post jobs.</p>
                    <button className="btn btn-primary" onClick={() => onAuthOpen("login")}>Login as Employer</button>
                </div>
            );
            const handleSubmit = e => {
                e.preventDefault();
                if (!form.title || !form.description || !form.salary || !form.deadline || !form.location) { setError("Please fill all required fields."); return; }
                setLoading(true);
                setTimeout(() => {
                    DB.addJob({ ...form, requirements: form.requirements.split(",").map(r => r.trim()).filter(Boolean), postedBy: user.id });
                    setLoading(false); setSuccess(true);
                }, 800);
            };
            if (success) return (
                <div className="postjob-success">
                    <div className="success-circle">✅</div>
                    <h2>Job Posted Successfully!</h2>
                    <p>Your listing is now live. Candidates can apply right away.</p>
                    <div style={{ display: "flex", gap: "16px", marginTop: "24px" }}>
                        <button className="btn btn-primary" onClick={() => onNavigate("dashboard")}>View My Jobs</button>
                        <button className="btn btn-outline" onClick={() => { setSuccess(false); setForm({ title: "", company: user.company || "", location: "", type: "Full-time", category: "Technology", salary: "", experience: "0–2 Years", description: "", requirements: "", deadline: "", logo: "💼" }); }}>Post Another</button>
                    </div>
                </div>
            );
            return (
                <div className="postjob-page">
                    <div className="postjob-header"><h1>Post a <span className="text-accent">New Job</span></h1><p>Fill in the details to attract the right candidates</p></div>
                    <div className="postjob-container">
                        <form className="postjob-form" onSubmit={handleSubmit}>
                            {error && <div className="form-error"><i className="fa fa-exclamation-circle"></i> {error}</div>}
                            <div className="form-group"><label>Job Logo / Icon</label>
                                <div className="logo-picker">{logos.map(l => <button key={l} type="button" className={`logo-option ${form.logo === l ? "logo-selected" : ""}`} onClick={() => setForm({ ...form, logo: l })}>{l}</button>)}</div></div>
                            <div className="form-row">
                                <div className="form-group"><label>Job Title *</label><div className="input-wrap"><i className="fa fa-briefcase input-icon"></i><input name="title" type="text" placeholder="e.g. Frontend Developer" value={form.title} onChange={h} required /></div></div>
                                <div className="form-group"><label>Company Name *</label><div className="input-wrap"><i className="fa fa-building input-icon"></i><input name="company" type="text" placeholder="Company name" value={form.company} onChange={h} required /></div></div>
                            </div>
                            <div className="form-row">
                                <div className="form-group"><label>Location *</label><div className="input-wrap"><i className="fa fa-map-marker-alt input-icon"></i>
                                    <select name="location" value={form.location} onChange={h} required><option value="">Select location</option>{["Bangalore", "Mumbai", "Delhi", "Hyderabad", "Chennai", "Pune", "Remote"].map(l => <option key={l}>{l}</option>)}</select></div></div>
                                <div className="form-group"><label>Job Type *</label><div className="input-wrap"><i className="fa fa-clock input-icon"></i>
                                    <select name="type" value={form.type} onChange={h}>{["Full-time", "Part-time", "Remote", "Internship"].map(t => <option key={t}>{t}</option>)}</select></div></div>
                            </div>
                            <div className="form-row">
                                <div className="form-group"><label>Category *</label><div className="input-wrap"><i className="fa fa-tag input-icon"></i>
                                    <select name="category" value={form.category} onChange={h}>{["Technology", "Data Science", "Design", "Marketing", "Finance", "Human Resources"].map(c => <option key={c}>{c}</option>)}</select></div></div>
                                <div className="form-group"><label>Experience Level *</label><div className="input-wrap"><i className="fa fa-chart-line input-icon"></i>
                                    <select name="experience" value={form.experience} onChange={h}>{["Fresher", "0–2 Years", "1–3 Years", "2–5 Years", "3–6 Years", "5+ Years"].map(e => <option key={e}>{e}</option>)}</select></div></div>
                            </div>
                            <div className="form-row">
                                <div className="form-group"><label>Salary / Stipend *</label><div className="input-wrap"><i className="fa fa-rupee-sign input-icon"></i><input name="salary" type="text" placeholder="e.g. ₹8–12 LPA" value={form.salary} onChange={h} required /></div></div>
                                <div className="form-group"><label>Application Deadline *</label><div className="input-wrap"><i className="fa fa-calendar input-icon"></i><input name="deadline" type="date" value={form.deadline} onChange={h} required min={new Date().toISOString().split("T")[0]} /></div></div>
                            </div>
                            <div className="form-group"><label>Job Description *</label>
                                <textarea name="description" placeholder="Describe the role, responsibilities, and what you're looking for..." value={form.description} onChange={h} rows="5"
                                    style={{ width: "100%", padding: "12px 14px", borderRadius: "8px", border: "1.5px solid #e5e7eb", fontSize: "14px", resize: "vertical", fontFamily: "inherit", outline: "none" }} required /></div>
                            <div className="form-group"><label>Required Skills (comma-separated)</label>
                                <div className="input-wrap"><i className="fa fa-list input-icon"></i><input name="requirements" type="text" placeholder="React, JavaScript, SQL..." value={form.requirements} onChange={h} /></div>
                                {form.requirements && <div className="jc-skills" style={{ marginTop: "10px" }}>{form.requirements.split(",").map((r, i) => r.trim() && <span key={i} className="skill-pill">{r.trim()}</span>)}</div>}</div>
                            <button type="submit" className={`btn btn-primary btn-full ${loading ? "btn-loading" : ""}`} disabled={loading} style={{ marginTop: "8px", padding: "14px" }}>
                                {loading ? <span className="spinner"></span> : <><i className="fa fa-paper-plane"></i> Publish Job Listing</>}</button>
                        </form>
                        <div className="postjob-preview">
                            <h3 className="preview-title">Live Preview</h3>
                            <div className="job-card-new" style={{ maxWidth: "100%" }}>
                                <div className="jc-header">
                                    <div className="jc-logo">{form.logo}</div>
                                    <div className="jc-title-wrap"><h3 className="jc-title">{form.title || "Job Title"}</h3><span className="jc-company">{form.company || "Company Name"}</span></div>
                                </div>
                                <div className="jc-meta"><span className="jc-tag">{form.location || "Location"}</span><span className="jc-tag">{form.type}</span><span className="jc-tag">{form.experience}</span></div>
                                <p className="jc-desc">{(form.description || "Your job description will appear here...").slice(0, 110)}{form.description.length > 110 ? "..." : ""}</p>
                                {form.requirements && <div className="jc-skills">{form.requirements.split(",").slice(0, 4).map((r, i) => r.trim() && <span key={i} className="skill-pill">{r.trim()}</span>)}</div>}
                                <div className="jc-footer"><span className="jc-salary">{form.salary || "Salary"}</span><button className="btn btn-primary btn-sm" disabled>Apply Now</button></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        function Footer({ onNavigate }) {
            const [email, setEmail] = React.useState("");
            const [subscribed, setSubscribed] = React.useState(false);
            const handleSub = e => { e.preventDefault(); if (email) { setSubscribed(true); setEmail(""); } };
            return (
                <footer className="footer-new">
                    <div className="footer-top">
                        <div className="footer-col footer-brand">
                            <div className="footer-logo">💼 Career<span>Hub</span></div>
                            <p className="footer-tagline">India's fastest-growing job portal connecting talent with top companies across every industry.</p>
                            <div className="footer-socials">
                                {[["fab fa-linkedin-in", "LinkedIn"], ["fab fa-twitter", "Twitter"], ["fab fa-instagram", "Instagram"], ["fab fa-facebook-f", "Facebook"]].map(([cls, title]) => (
                                    <a key={title} href="#" className="social-link" title={title}><i className={cls}></i></a>
                                ))}
                            </div>
                        </div>
                        <div className="footer-col">
                            <h4 className="footer-heading">For Job Seekers</h4>
                            <ul className="footer-links">
                                <li><a href="#" onClick={e => { e.preventDefault(); onNavigate("jobs"); }}>Browse All Jobs</a></li>
                                <li><a href="#" onClick={e => { e.preventDefault(); onNavigate("internships"); }}>Internships</a></li>
                                <li><a href="#" onClick={e => { e.preventDefault(); onNavigate("companies"); }}>Top Companies</a></li>
                                <li><a href="#">Career Advice</a></li>
                                <li><a href="#">Resume Tips</a></li>
                            </ul>
                        </div>
                        <div className="footer-col">
                            <h4 className="footer-heading">For Employers</h4>
                            <ul className="footer-links">
                                <li><a href="#" onClick={e => { e.preventDefault(); onNavigate("postjob"); }}>Post a Job</a></li>
                                <li><a href="#">Browse Candidates</a></li>
                                <li><a href="#">Pricing Plans</a></li>
                                <li><a href="#">Employer Dashboard</a></li>
                                <li><a href="#">Success Stories</a></li>
                            </ul>
                        </div>
                        <div className="footer-col">
                            <h4 className="footer-heading">Stay Updated</h4>
                            <p style={{ color: "#9ca3af", fontSize: "14px", marginBottom: "16px" }}>Get the latest jobs delivered to your inbox.</p>
                            <form className="footer-newsletter" onSubmit={handleSub}>
                                {subscribed ? <div className="subscribe-success">✅ Subscribed! Thank you.</div> : (
                                    <><input type="email" placeholder="Enter your email" value={email} onChange={e => setEmail(e.target.value)} required />
                                        <button type="submit" className="btn btn-primary">Subscribe</button></>
                                )}
                            </form>
                            <div className="footer-badges">
                                <span className="footer-badge">🔒 Secure</span>
                                <span className="footer-badge">✅ Verified</span>
                                <span className="footer-badge">⚡ Fast Apply</span>
                            </div>
                        </div>
                    </div>
                    <div className="footer-bottom">
                        <p>© 2026 CareerHub — All rights reserved. Built with ❤️ for the next generation of professionals.</p>
                        <div className="footer-bottom-links"><a href="#">Privacy</a><a href="#">Terms</a><a href="#">Contact</a></div>
                    </div>
                </footer>
            );
        }

        /* ============================================================
           ROOT APP
           ============================================================ */
        DB.init();

        function App() {
            const [user, setUser] = React.useState(DB.getSession());
            const [view, setView] = React.useState("home");
            const [authModal, setAuthModal] = React.useState(null);
            const [navFilters, setNavFilters] = React.useState(null);
            const [toast, setToast] = React.useState(null);

            const showToast = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 3500); };
            const handleLogin = u => { setUser(u); setAuthModal(null); showToast(`🎉 Welcome, ${u.name}!`); setView("home"); };
            const handleLogout = () => { DB.clearSession(); setUser(null); setView("home"); showToast("👋 Logged out successfully."); };
            const handleNavigate = (v, filters = null) => { setNavFilters(filters); setView(v); window.scrollTo({ top: 0, behavior: "smooth" }); };

            const featuredJobs = DB.getJobs().filter(j => j.featured).slice(0, 6);
            const bookmarks = user ? DB.getBookmarks(user.id) : [];
            const handleApplyHome = job => { if (!user) { setAuthModal("login"); return; } handleNavigate("jobs", { query: job.title }); };
            const handleBmHome = jobId => { if (!user) { setAuthModal("login"); return; } DB.toggleBookmark(jobId, user.id); showToast("Bookmark updated!"); };

            return (
                <div className="app-root">
                    {toast && <div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
                    {authModal && <AuthModal mode={authModal} onClose={() => setAuthModal(null)} onLogin={handleLogin} />}
                    <Navbar user={user} onNavigate={handleNavigate} onLogout={handleLogout} onAuthOpen={setAuthModal} currentView={view} />
                    <main className="main-content">
                        {view === "home" && <>
                            <Hero onNavigate={handleNavigate} user={user} />
                            <section className="home-featured">
                                <div className="section-header">
                                    <div><h2 className="section-title">Featured <span className="text-accent">Opportunities</span></h2><p className="section-sub">Hand-picked jobs from top companies</p></div>
                                    <button className="btn btn-outline" onClick={() => handleNavigate("jobs")}>View All Jobs <i className="fa fa-arrow-right"></i></button>
                                </div>
                                <div className="jobs-grid">
                                    {featuredJobs.map(job => <JobCard key={job.id} job={job} user={user} onApply={handleApplyHome} onViewDetail={j => handleNavigate("jobs", { query: j.title })} bookmarks={bookmarks} onToggleBookmark={handleBmHome} />)}
                                </div>
                            </section>
                            <section className="why-section">
                                <h2 className="section-title">Why Choose <span className="text-accent">CareerHub</span>?</h2>
                                <div className="why-grid">
                                    {[
                                        { icon: "🔍", title: "Smart Job Matching", desc: "Our algorithm matches your skills to the most relevant opportunities across India." },
                                        { icon: "⚡", title: "One-Click Apply", desc: "Apply to multiple jobs instantly with your saved profile — no repetitive forms." },
                                        { icon: "🏢", title: "Verified Companies", desc: "Every employer is verified, so you can trust every single listing on CareerHub." },
                                        { icon: "📊", title: "Track Applications", desc: "Monitor your application status and get real-time updates from employers." },
                                        { icon: "🎯", title: "Fresher Friendly", desc: "Dedicated section for freshers and students with internship & entry-level roles." },
                                        { icon: "💬", title: "Career Guidance", desc: "Access expert career tips, resume guides, and interview prep resources free." },
                                    ].map(item => (
                                        <div key={item.title} className="why-card">
                                            <span className="why-icon">{item.icon}</span>
                                            <h3 className="why-title">{item.title}</h3>
                                            <p className="why-desc">{item.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            <section className="cta-section">
                                <div className="cta-content">
                                    <h2>Ready to Land Your Dream Job?</h2>
                                    <p>Join 50,000+ professionals who found their career on CareerHub.</p>
                                    <div className="cta-btns">
                                        <button className="btn btn-outline-white btn-lg" onClick={() => handleNavigate("jobs")}>🔍 Browse Jobs</button>
                                        {!user && <button className="btn btn-outline-white btn-lg" onClick={() => setAuthModal("register")}>✨ Create Free Account</button>}
                                    </div>
                                </div>
                            </section>
                        </>}
                        {(view === "jobs" || view === "internships" || view === "companies") && (
                            <JobList user={user} onAuthOpen={setAuthModal} initialFilters={view === "internships" ? { ...navFilters, query: "Intern" } : navFilters} onNavigate={handleNavigate} />
                        )}
                        {view === "dashboard" && <Dashboard user={user} onNavigate={handleNavigate} onAuthOpen={setAuthModal} />}
                        {view === "postjob" && <PostJob user={user} onNavigate={handleNavigate} onAuthOpen={setAuthModal} />}
                    </main>
                    <Footer onNavigate={handleNavigate} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
