<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>React App</title>
	<style>
		body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
		.App { max-width: 800px; margin: 0 auto; }
		nav ul { list-style: none; padding: 0; display: flex; gap: 20px; }
		nav { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
		.user-profile { background: #e8f4f8; padding: 15px; border-radius: 5px; margin-top: 20px; }
	</style>
</head>
<body>
	<div id="root"></div>
	
	<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
	<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	<script type="text/babel" src="app.js"></script>
	<script type="text/babel">
		const root = ReactDOM.createRoot(document.getElementById('root'));
		root.render(<App />);
	</script>
</body>
</html>
